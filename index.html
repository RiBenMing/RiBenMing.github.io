<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RiBenMing</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FAF5F0;
      --text: #3D2C25;
      --accent: #D97757;
      --muted: #C2A89A;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1.125rem;
      line-height: 1.7;
      color: #7A6B63;
      max-width: 480px;
      margin: 0 auto;
    }

    nav {
      margin-top: 2.5rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      transition: background 0.2s, color 0.2s;
    }

    nav a:hover {
      background: rgba(217, 119, 87, 0.12);
      color: var(--accent);
    }

    footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <span class="dot"></span>
    <h1>RiBenMing</h1>
    <p>写点代码，做点东西。</p>
    <nav>
      <a href="https://github.com/RiBenMing">GitHub</a>
    </nav>
  </main>
  <footer>© 2026 RiBenMing</footer>
</body>
</html>
