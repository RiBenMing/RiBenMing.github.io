<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — RiBenMing</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FAF5F0;
      --text: #3D2C25;
      --accent: #D97757;
      --muted: #C2A89A;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .back:hover {
      color: var(--accent);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      padding: 2rem 0 1.5rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    header p {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .post-list {
      list-style: none;
    }

    .post-list li {
      padding: 1rem 0;
      border-bottom: 1px solid rgba(217, 119, 87, 0.15);
    }

    .post-list a {
      text-decoration: none;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }

    .post-list a:hover .post-title {
      color: var(--accent);
    }

    .post-title {
      font-size: 1.05rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .post-date {
      font-size: 0.85rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .post-content {
      margin-top: 2rem;
      display: none;
    }

    .post-content.active {
      display: block;
    }

    .post-content h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: var(--text);
    }

    .post-content h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 2rem 0 0.75rem;
      color: var(--text);
    }

    .post-content h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 1.5rem 0 0.5rem;
      color: var(--text);
    }

    .post-content p {
      font-size: 1rem;
      line-height: 1.8;
      color: #4A3F3A;
      margin-bottom: 1.25rem;
    }

    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin: 1.25rem 0;
      color: #7A6B63;
      font-style: italic;
    }

    .post-content pre {
      background: #3D2C25;
      color: #FAF5F0;
      padding: 1rem 1.25rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .post-content code {
      font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, monospace;
      font-size: 0.88em;
    }

    .post-content p code {
      background: rgba(217, 119, 87, 0.1);
      color: var(--accent);
      padding: 0.15em 0.4em;
      border-radius: 0.25em;
    }

    .post-content a {
      color: var(--accent);
      text-decoration: none;
    }

    .post-content a:hover {
      text-decoration: underline;
    }

    .post-content ul, .post-content ol {
      margin: 0 0 1.25rem 1.25rem;
      color: #4A3F3A;
      line-height: 1.8;
    }

    .post-content img {
      max-width: 100%;
      border-radius: 0.5rem;
    }

    .post-content hr {
      border: none;
      border-top: 1px solid rgba(217, 119, 87, 0.2);
      margin: 2rem 0;
    }

    .nav-blog {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.5rem 1.2rem;
      border-radius: 0.5rem;
      margin-top: 2.5rem;
      transition: opacity 0.2s;
    }

    .nav-blog:hover {
      opacity: 0.88;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Home</a>
    <header>
      <h1>Blog</h1>
    </header>

    <section id="list">
      <ul class="post-list" id="post-list"></ul>
    </section>

    <section id="single" class="post-content"></section>


  </div>

  <script>
    const posts = [];

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)/);
      if (!match) return { meta: {}, body: text };
      const metaBlock = match[1];
      const body = match[2];
      const meta = {};
      metaBlock.split('\n').forEach(line => {
        const m = line.match(/^(\w+):\s*(.+)/);
        if (m) meta[m[1].trim()] = m[2].trim();
      });
      return { meta, body };
    }

    function renderPost(meta, html, slug) {
      document.getElementById('list').style.display = 'none';
      const el = document.getElementById('single');
      el.classList.add('active');
      el.innerHTML = `
        <h1>${meta.title || slug}</h1>
        ${meta.date ? `<p style="color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem">${meta.date}</p>` : ''}
        ${html}
      `;
      history.replaceState(null, '', `?p=${slug}`);
    }

    function showList() {
      document.getElementById('list').style.display = 'block';
      document.getElementById('single').classList.remove('active');
      document.getElementById('single').innerHTML = '';
      history.replaceState(null, '', window.location.pathname);
    }

    async function loadAllPosts() {
      const files = await fetch('/posts/index.json')
        .then(r => r.json())
        .catch(() => [
          { file: 'hello-world.md' }
        ]);

      const items = await Promise.all(
        files.map(f =>
          fetch(`/posts/${f.file}`)
            .then(r => r.text())
            .then(text => {
              const { meta } = parseFrontmatter(text);
              return { file: f.file, meta, body: text };
            })
            .catch(() => null)
        )
      );

      const valid = items.filter(Boolean).sort((a, b) =>
        (b.meta.date || '').localeCompare(a.meta.date || '')
      );

      valid.forEach(item => {
        posts.push({
          meta: item.meta,
          html: marked.parse(item.body.replace(/^---\n[\s\S]*?\n---\n/, ''))
        });
      });

      const listEl = document.getElementById('post-list');
      valid.forEach(({ file, meta }) => {
        const slug = meta.slug || file.replace('.md', '');
        const li = document.createElement('li');
        li.innerHTML = `
          <a href="?p=${slug}" data-slug="${slug}">
            <span class="post-title">${meta.title || slug}</span>
            <span class="post-date">${meta.date || ''}</span>
          </a>
        `;
        listEl.appendChild(li);
      });

      document.getElementById('post-list').addEventListener('click', function(e) {
        const link = e.target.closest('a[data-slug]');
        if (!link) return;
        e.preventDefault();
        const slug = link.getAttribute('data-slug');
        const post = posts.find(p => p.meta.slug === slug);
        if (post) renderPost(post.meta, post.html, slug);
      });
    }

    const params = new URLSearchParams(window.location.search);
    const postSlug = params.get('p');

    if (postSlug) {
      loadAllPosts().then(() => {
        const post = posts.find(p => p.meta.slug === postSlug);
        if (post) renderPost(post.meta, post.html, postSlug);
      });
    } else {
      loadAllPosts();
    }
  </script>
</body>
</html>
